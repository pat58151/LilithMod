# Copy this file to voice-config.ini and edit it. Restart Lilith afterwards.
#
# Paths may be:
#   relative to this folder      gpt-sovits\models\my-voice.ckpt
#   environment variables        %USERPROFILE%\GPT-SoVITS\models\my-voice.ckpt
#   absolute                     D:\GPT-SoVITS\models\my-voice.ckpt
#
# You only need to fill in the profile for the language you set as
# SpokenLanguage. The others can stay empty.

[Voice]
Enabled = true
ReplaceGameVoice = true

# What she says aloud, and what you read. These are independent -
# Japanese speech with English subtitles is an intended combination.
SpokenLanguage = ja
SubtitleLanguage = en

Endpoint = http://127.0.0.1:9880/tts

# Only used by runtime\start-lilith.ps1, which can launch the server for you.
# Leave blank if you start GPT-SoVITS yourself.
RuntimePath =
ServerConfig =

[Profile.ja]
# Change CacheIdentity whenever you change weights or reference audio, or
# previously synthesised lines keep playing in the old voice.
CacheIdentity = ja-v1
GptWeights =
SovitsWeights =
RefAudioPath =
# The exact transcript of RefAudioPath, punctuation included.
PromptText =
PromptLanguage = ja
# Spoken once at startup to warm the model. You will not hear it.
WarmUpText = うん……リリスはずっとここにいるわ。

[Profile.en]
CacheIdentity = en-v1
GptWeights =
SovitsWeights =
RefAudioPath =
PromptText =
PromptLanguage = en
WarmUpText = Mm... Lilith is right here.

[Profile.zh]
CacheIdentity = zh-v1
GptWeights =
SovitsWeights =
RefAudioPath =
PromptText =
PromptLanguage = zh
WarmUpText = 嗯……莉莉丝一直都在这里哦。
