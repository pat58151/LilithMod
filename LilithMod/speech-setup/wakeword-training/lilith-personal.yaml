# "Lilith" wake word - personal variant. Same synthetic corpus, plus the
# developer's real recordings injected into the positive clips (train.ps1 does
# the injection) and 17 minutes of their normal speech as an extra negative
# feature set. Local use only; never shipped.

model_name: "lilith_personal"
target_phrase:
  - "lilith"

custom_negative_phrases: []

n_samples: 30000
n_samples_val: 2000
tts_batch_size: 50
augmentation_batch_size: 16
augmentation_rounds: 1

piper_sample_generator_path: "./piper-sample-generator"
output_dir: "./lilith_personal"

rir_paths:
  - "./mit_rirs"
background_paths:
  - "./audioset_16k"
background_paths_duplication_rate:
  - 1

false_positive_validation_data_path: "./data/validation_set_features.npy"
feature_data_files:
  "ACAV100M_sample": "./data/openwakeword_features_ACAV100M_2000_hrs_16bit.npy"
  "user_negative": "./data/user_negative_features.npy"

batch_n_per_class:
  "ACAV100M_sample": 1024
  "adversarial_negative": 50
  "positive": 50
  # Small file, deliberately oversampled: false triggers on the one voice the
  # mic hears all day are the expensive kind.
  "user_negative": 32

model_type: "dnn"
layer_size: 32
steps: 25000
max_negative_weight: 1500
target_false_positives_per_hour: 0.2
